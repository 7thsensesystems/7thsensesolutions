<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#F7F5F2" />
  <meta name="robots" content="noindex" />
  <title>Page not found — 7th Sense Solutions</title>
  <link rel="icon" type="image/png" sizes="256x256" href="assets/7ss-favicon-256.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500&family=Bebas+Neue&family=Barlow+Condensed:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .e404 { min-height: 82vh; display: grid; place-items: center; text-align: center; padding: 60px var(--gutter); position: relative; }
    .e404__code { font-family: var(--f-num); font-size: clamp(6rem, 22vw, 13rem); line-height: .82; color: transparent; -webkit-text-stroke: 2px var(--signal); }
    .e404 h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin: 8px 0 12px; }
    .e404 p { color: var(--ink-soft); max-width: 44ch; margin: 0 auto 26px; }
    .e404 .eyebrow { justify-content: center; }
  </style>
</head>
<body>
  <main class="e404">
    <span class="reg reg--tl"></span><span class="reg reg--br"></span>
    <div>
      <span class="e404__code">404</span>
      <p class="eyebrow"><span class="eyebrow__rule"></span>Off the map<span class="eyebrow__rule"></span></p>
      <h1>This page isn't part of the system.</h1>
      <p>The link may have moved or never existed. Let's get you back to something useful.</p>
      <a class="btn btn--primary btn--lg" href="/">Back to home</a>
    </div>
  </main>
</body>
</html>
